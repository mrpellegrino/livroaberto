services:
  postgres:
    image: postgres:16-alpine
    container_name: livroaberto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: livroaberto
      POSTGRES_USER: livroaberto
      POSTGRES_PASSWORD: livroaberto
    ports:
      - "5432:5432"
    volumes:
      - livroaberto_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livroaberto -d livroaberto"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  livroaberto_postgres_data:
